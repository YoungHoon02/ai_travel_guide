<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Travel Planner Prototype</title>
    <script>
      (function () {
        var key = "%VITE_GOOGLE_MAPS_API_KEY%";
        var placeholder = "%VITE_GOOGLE_MAPS_API_KEY%";
        if (key && key.length > 0 && key !== placeholder) {
          var s = document.createElement("script");
          s.src =
            "https://maps.googleapis.com/maps/api/js?key=" +
            key +
            "&libraries=places,geometry&callback=__gmapsReady";
          s.async = true;
          s.defer = true;
          window.__gmapsReady = function () {
            window.__googleMapsLoaded = true;
            window.dispatchEvent(new Event("googlemapsloaded"));
          };
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
